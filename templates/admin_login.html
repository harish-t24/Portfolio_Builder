<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

/* CARD */
.container{
    width:400px;
    max-width:90%;
    background:#1e1e2f;
    padding:40px;
    border-radius:20px;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
    text-align:center;
    animation:fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h2{
    color:white;
    margin-bottom:25px;
}

/* INPUTS */
input{
    width:100%;
    padding:12px;
    margin:12px 0;
    border:none;
    border-radius:8px;
    background:#2c2c44;
    color:white;
}

input:focus{
    outline:none;
    box-shadow:0 0 8px #00c6ff;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* MESSAGE */
.msg{
    color:#ff4d4d;
    margin-bottom:10px;
}

/* BACK LINK */
.back-link{
    display:block;
    margin-top:15px;
    color:#00c6ff;
    text-decoration:none;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Admin Login</h2>

    <div class="msg">{{msg}}</div>

    <form method="POST">
        <input name="username" placeholder="Admin Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <a href="/" class="back-link">← Back to Home</a>
</div>

</body>
</html>
