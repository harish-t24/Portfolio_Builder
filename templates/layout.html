<!DOCTYPE html>
<html>
<head>
<title>Choose Layout</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

h1{
    margin:25px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    padding:20px;
}

/* CARD */
.layout-card{
    background:rgba(255,255,255,0.05);
    border-radius:15px;
    padding:15px;
    transition:0.3s;
}

.layout-card:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #00c6ff;
}

/* PREVIEW BOX */
.preview{
    height:180px;
    border-radius:10px;
    margin-bottom:10px;
    display:flex;
}

/* 🔥 REAL LAYOUT PREVIEWS */

/* MODERN */
.modern{
    background:#1e1e2f;
    justify-content:center;
    align-items:center;
}
.modern::after{
    content:"Profile Card";
    color:#00c6ff;
}

/* SIDEBAR */
.sidebar{
    background:linear-gradient(to right,#1e1e2f 30%,#ffffff 30%);
}
.sidebar::after{
    content:"Sidebar Layout";
    margin:auto;
    color:black;
}

/* SPLIT */
.split{
    background:linear-gradient(to right,#0f2027 50%,#183932 50%);
}
.split::after{
    content:"Animated Screen";
    margin:auto;
    color:black;
}

/* CLASSIC */
.classic{
    background:#ffffff;
}
.classic::after{
    content:"Resume Style";
    margin:auto;
    color:black;
}

/* BUTTON */
button{
    padding:8px 16px;
    border:none;
    border-radius:8px;
    background:#00c6ff;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<h1>🚀 Choose Your Portfolio Layout</h1>

<div class="grid">

    <!-- MODERN -->
    <div class="layout-card">
        <div class="preview modern"></div>
        <h3>Modern Card</h3>
        <button onclick="selectLayout('modern')">Use</button>
    </div>

    <!-- SIDEBAR -->
    <div class="layout-card">
        <div class="preview sidebar"></div>
        <h3>Sidebar</h3>
        <button onclick="selectLayout('sidebar')">Use</button>
    </div>

    <!-- SPLIT -->
    <div class="layout-card">
        <div class="preview split"></div>
        <h3>Animated</h3>
        <button onclick="selectLayout('split')">Use</button>
    </div>

    <!-- CLASSIC -->
    <div class="layout-card">
        <div class="preview classic"></div>
        <h3>Classic Resume</h3>
        <button onclick="selectLayout('classic')">Use</button>
    </div>

</div>

<script>
function selectLayout(layout){
    // redirect to backend
    window.location.href = "/save_layout/" + layout;
}
</script>

</body>
</html>
