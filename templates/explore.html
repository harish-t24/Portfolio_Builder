<!DOCTYPE html>
<html>
<head>
<title>Explore Portfolios</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    padding:20px;
}

/* HEADER */
h1{
    text-align:center;
    margin-bottom:20px;
}

/* FILTER BUTTONS */
.filters{
    text-align:center;
    margin-bottom:25px;
}

.filters button{
    margin:5px;
    padding:10px 18px;
    border:none;
    border-radius:20px;
    background:#00c6ff;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.filters button:hover{
    transform:scale(1.1);
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:15px;
    text-align:center;
    backdrop-filter:blur(10px);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.profile-img{
    width:100px;
    height:100px;
    border-radius:50%;
    border:3px solid #00c6ff;
}

/* TEXT */
.domain{
    color:#00c6ff;
    font-weight:bold;
}

.skills{
    font-size:13px;
    margin:10px 0;
    color:#ccc;
}

/* BUTTONS */
.btn-group{
    margin-top:10px;
}

.view-btn, .download-btn{
    display:inline-block;
    margin:5px;
    padding:8px 14px;
    border-radius:8px;
    text-decoration:none;
    color:white;
}

.view-btn{
    background:#4caf50;
}

.download-btn{
    background:#ff9800;
}
</style>
</head>

<body>

<h1>🚀 Explore Portfolios</h1>

<!-- FILTER -->
<div class="filters">
    <button onclick="filter('all')">All</button>
    <button onclick="filter('web')">Web Dev</button>
    <button onclick="filter('ai')">AI</button>
    <button onclick="filter('python')">Python</button>
    <button onclick="filter('data')">Data Science</button>
    <button onclick="filter('mobile')">Mobile Dev</button>
    <button onclick="filter('full')">Full Stack</button>
    <button onclick="filter('other')">Other</button>
</div>

<!-- CARDS -->
<div class="grid" id="grid">
    {{cards}}
</div>

<script>
function filter(domain){
    const cards = document.querySelectorAll(".card");

    cards.forEach(card=>{
        if(domain === "all"){
            card.style.display="block";
        }
        else{
            const d = card.getAttribute("data-domain");

            if(d.includes(domain)){
                card.style.display="block";
            } else {
                card.style.display="none";
            }
        }
    });
}
</script>

</body>
</html>
