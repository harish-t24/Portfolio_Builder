<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>
<style>
body{
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:Arial;
}
.box{
    background:white;
    padding:25px;
    width:350px;
    border-radius:14px;
}
input,button{
    width:100%;
    margin-top:10px;
    padding:10px;
}
button{
    background:#667eea;
    color:white;
    border:none;
    font-weight:bold;
}
.msg{color:red;margin-top:10px;}
</style>
</head>
<body>

<div class="box">
<h2>Reset Password</h2>
<div class="msg">{{msg}}</div>
<form method="POST">
<input name="username" placeholder="Username" required>
<input name="password" type="password" placeholder="New Password" required>
<button>Reset</button>
</form>
<p><a href="/login">Back to Login</a></p>
</div>

</body>
</html>
