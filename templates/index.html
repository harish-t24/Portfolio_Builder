<!DOCTYPE html>
<html>
<head>
<title>Portfolio Builder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c3c);
    background-size:400% 400%;
    animation:gradientMove 12s ease infinite;
    padding:30px;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    width:100%;
    max-width:900px;
    background:rgba(30,30,47,0.9);
    backdrop-filter:blur(12px);
    padding:40px;
    border-radius:20px;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
    color:white;
    animation:fadeUp 1s ease;
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}

h2{
    text-align:center;
    margin-bottom:30px;
    font-size:28px;
}

/* GRID LAYOUT */
.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.full{
    grid-column:1 / 3;
}

/* INPUTS */
.input-group{
    position:relative;
}

input, textarea{
    width:100%;
    padding:14px 12px;
    border:none;
    border-radius:10px;
    background:#2c2c44;
    color:white;
    font-size:14px;
    outline:none;
}

textarea{
    resize:none;
    height:100px;
}

input:focus, textarea:focus{
    box-shadow:0 0 10px #00c6ff;
}

/* FILE INPUT */
input[type="file"]{
    background:#1e1e2f;
    padding:10px;
    border:1px solid #444;
}

/* BUTTON */
button{
    width:100%;
    padding:14px;
    margin-top:25px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 10px 25px rgba(0,198,255,0.4);
}

/* RESPONSIVE */
@media(max-width:768px){
    .form-grid{
        grid-template-columns:1fr;
    }
    .full{
        grid-column:1;
    }
}
</style>
</head>

<body>

<div class="container">
<h2>🚀 Create Your Portfolio</h2>

<form method="POST" enctype="multipart/form-data">

<div class="form-grid">

<div class="input-group">
<input name="name" placeholder="Full Name" required>
</div>

<div class="input-group">
<input name="domain" placeholder="Domain / Role" required>
</div>

<div class="input-group full">
<textarea name="about" placeholder="About & Achievements" required></textarea>
</div>

<div class="input-group">
<textarea name="skills" placeholder="Skills (comma separated)"></textarea>
</div>

<div class="input-group full">
<textarea name="projects" placeholder="Projects"></textarea>
</div>

<div class="input-group">
<input name="college_name" placeholder="College Name" required>
</div>

<div class="input-group">
<input name="cgpa" placeholder="CGPA" required>
</div>

<div class="input-group">
<input name="school_name" placeholder="12th School Name" required>
</div>

<div class="input-group">
<input name="percentage" placeholder="Percentage" required>
</div>

<div class="input-group">
<input name="email" placeholder="Email" required>
</div>

<div class="input-group">
<input name="github_url" placeholder="Github URL" required>
</div>

<div class="input-group">
<input name="linkedin_url" placeholder="LinkedIn URL" required>
</div>
<br>
<div class="input-group">
<label>Profile Image</label>
<input type="file" name="image" required>
</div>

<div class="input-group">
<label>Resume (PDF/DOC)</label>
<input type="file" name="resume" required>
</div>

</div>
<br>

<button type="submit">✨ Generate Portfolio</button>

</form>
</div>

</body>
</html>
