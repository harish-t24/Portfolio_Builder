<!DOCTYPE html>
<html>
<head>
<title>Auth - Portfolio Builder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.container{
    width:800px;
    max-width:95%;
    height:500px;
    background:#1e1e2f;
    border-radius:20px;
    overflow:hidden;
    position:relative;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* FORM BOX */
.form-box{
    position:absolute;
    top:0;
    height:100%;
    width:50%;
    padding:60px 40px;
    transition:all 0.6s ease-in-out;
}

h2{
    color:white;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:12px;
    margin:12px 0;
    border:none;
    border-radius:8px;
    background:#2c2c44;
    color:white;
}

input:focus{
    outline:none;
    box-shadow:0 0 8px #00c6ff;
}

button{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* LOGIN */
.form-box.login{
    left:0;
    z-index:2;
}

/* REGISTER */
.form-box.register{
    left:0;
    opacity:0;
    z-index:1;
}

/* ACTIVE STATE */
.container.active .form-box.login{
    transform:translateX(100%);
    opacity:0;
}

.container.active .form-box.register{
    transform:translateX(100%);
    opacity:1;
    z-index:2;
}

/* SWITCH PANEL */
.switch-panel{
    position:absolute;
    top:0;
    left:50%;
    width:50%;
    height:100%;
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:40px;
    transition:0.6s ease-in-out;
}

.switch-panel button{
    background:white;
    color:#0072ff;
    width:auto;
    padding:10px 25px;
}

/* MOVE SWITCH PANEL */
.container.active .switch-panel{
    transform:translateX(-100%);
}
</style>
</head>

<body>

<div class="container" id="container">

    <!-- LOGIN -->
    <div class="form-box login">
        <h2>Login</h2>
        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" id="loginPass" name="password" placeholder="Password" required>
            <p style="text-align:right; margin-top:-5px;">
                <a href="/forgot" style="color:#00c6ff; font-size:14px; text-decoration:none;">
                    Forgot Password?
                </a>
            </p>
            <button type="button" onclick="togglePass('loginPass')">Show Password</button>
            <button type="submit">Login</button>
        </form>
    </div>

    <!-- REGISTER -->
    <div class="form-box register">
        <h2>Create Account</h2>
        <form method="POST" action="/register">
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" id="regPass" name="password" placeholder="Password" required>
            <button type="button" onclick="togglePass('regPass')">Show Password</button>
            <button type="submit">Register</button>
        </form>
    </div>

    <!-- SWITCH PANEL -->
    <div class="switch-panel">
        <h2 id="panelTitle">New Here?</h2>
        <p id="panelText">Create an account to start building your AI portfolio.</p>
        <button onclick="toggle()">Switch</button>
    </div>

</div>

<script>
const container = document.getElementById("container");

function toggle(){
    container.classList.toggle("active");

    if(container.classList.contains("active")){
        document.getElementById("panelTitle").innerText="Welcome Back!";
        document.getElementById("panelText").innerText="Login to continue building your portfolio.";
    } else {
        document.getElementById("panelTitle").innerText="New Here?";
        document.getElementById("panelText").innerText="Create an account to start building your AI portfolio.";
    }
}

function togglePass(id){
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
